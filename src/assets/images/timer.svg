<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Timer (3 dots)">
    <!-- Outer arc (gap in upper-right) -->
    <path
            d="M 22.46 11.08 A 10.5 10.5 0 1 1 12.92 1.54"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
    />

    <!-- Three dots along the gap arc -->
    <circle cx="16.04" cy="2.31" r="1" fill="currentColor"/>
    <circle cx="19.42" cy="4.58" r="1" fill="currentColor"/>
    <circle cx="21.69" cy="7.96" r="1" fill="currentColor"/>

    <!-- Clock hands -->
    <path
            d="M 12 12 L 12 4.5 M 12 12 L 17.3 14.4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
    />
</svg>
